spring.application.name=Microservice4
server.port=8084

# Base de donnees persistante
spring.datasource.url=jdbc:h2:file:./data/microservice4db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Debug
debug=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Mail notifications (configure with real SMTP credentials in your environment)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=saidazizz132@gmail.com
spring.mail.password=vxiynszzahjkdgmg
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# External service URLs
reclamation.user-service-url=${USER_SERVICE_URL:http://microservice1/api/auth/users}


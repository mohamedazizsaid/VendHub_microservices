spring.application.name=gateway
server.port=8085
#spring.datasource.url=jdbc:h2:file:./Database/Data/Candidat
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.hibernate.ddl-auto=create
#eureka server configuration
eureka.client.register-with-eureka=true
#eureka.client.fetch-registry=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
#log routes
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# CORS handled by CorsConfig.java bean

# Gateway Global CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=http://localhost:5173,http://127.0.0.1:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

# Keycloak OAuth2 Configuration
# Replace with your Keycloak server URL and realm name
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://127.0.0.1:8181/realms/micro_service_spring
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://127.0.0.1:8181/realms/micro_service_spring/protocol/openid-connect/certs

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
spring.security.ignored=/actuator/**

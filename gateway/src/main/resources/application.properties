spring.application.name=gateway
server.port=8085
#spring.datasource.url=jdbc:h2:file:./Database/Data/Candidat
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.hibernate.ddl-auto=create
#eureka server configuration
eureka.client.register-with-eureka=true
#eureka.client.fetch-registry=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
#log routes
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# CORS handled by CorsConfig.java bean

# Gateway Global CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=http://localhost:5173,http://127.0.0.1:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

# Keycloak OAuth2 Configuration
# Replace with your Keycloak server URL and realm name
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://127.0.0.1:8181/realms/micro_service_spring
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://127.0.0.1:8181/realms/micro_service_spring/protocol/openid-connect/certs

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
spring.security.ignored=/actuator/**

# ===== SpringDoc / Swagger Aggregation =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].url=/v3/api-docs/authentification
springdoc.swagger-ui.urls[0].name=Authentification Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/products
springdoc.swagger-ui.urls[1].name=Products Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/reclamation
springdoc.swagger-ui.urls[2].name=Reclamation Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/commande
springdoc.swagger-ui.urls[3].name=Commande Service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/forum
springdoc.swagger-ui.urls[4].name=Forum Service
springdoc.swagger-ui.urls[5].url=/v3/api-docs/events
springdoc.swagger-ui.urls[5].name=Events Service

# Routes: proxy /v3/api-docs/<service> -> lb://<eureka-app-name>/v3/api-docs
spring.cloud.gateway.routes[0].id=authentification-docs
spring.cloud.gateway.routes[0].uri=lb://microservice1
spring.cloud.gateway.routes[0].predicates[0]=Path=/v3/api-docs/authentification
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/v3/api-docs/authentification, /v3/api-docs

spring.cloud.gateway.routes[1].id=products-docs
spring.cloud.gateway.routes[1].uri=lb://microservice2
spring.cloud.gateway.routes[1].predicates[0]=Path=/v3/api-docs/products
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/v3/api-docs/products, /v3/api-docs

spring.cloud.gateway.routes[2].id=reclamation-docs
spring.cloud.gateway.routes[2].uri=lb://Microservice4
spring.cloud.gateway.routes[2].predicates[0]=Path=/v3/api-docs/reclamation
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/v3/api-docs/reclamation, /v3/api-docs

spring.cloud.gateway.routes[3].id=commande-docs
spring.cloud.gateway.routes[3].uri=lb://microservice6
spring.cloud.gateway.routes[3].predicates[0]=Path=/v3/api-docs/commande
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/v3/api-docs/commande, /v3/api-docs

spring.cloud.gateway.routes[4].id=forum-docs
spring.cloud.gateway.routes[4].uri=lb://microservice5
spring.cloud.gateway.routes[4].predicates[0]=Path=/v3/api-docs/forum
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/v3/api-docs/forum, /v3/api-docs

spring.cloud.gateway.routes[5].id=events-docs
spring.cloud.gateway.routes[5].uri=lb://microservice3
spring.cloud.gateway.routes[5].predicates[0]=Path=/v3/api-docs/events
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/v3/api-docs/events, /v3/api-docs

# Main service traffic routes
spring.cloud.gateway.routes[6].id=authentification-service
spring.cloud.gateway.routes[6].uri=lb://microservice1
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[7].id=products-service
spring.cloud.gateway.routes[7].uri=lb://microservice2
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/products/**

spring.cloud.gateway.routes[8].id=reclamation-service
spring.cloud.gateway.routes[8].uri=lb://Microservice4
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/reclamations/**,/api/feedbacks/**

spring.cloud.gateway.routes[9].id=commande-service
spring.cloud.gateway.routes[9].uri=lb://microservice6
spring.cloud.gateway.routes[9].predicates[0]=Path=/api6/commandes/**

spring.cloud.gateway.routes[10].id=forum-service
spring.cloud.gateway.routes[10].uri=lb://microservice5
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/forums/**,/api/messages/**

spring.cloud.gateway.routes[11].id=events-service
spring.cloud.gateway.routes[11].uri=lb://microservice3
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/events/**

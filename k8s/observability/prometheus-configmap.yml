apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['gateway:8085']

      - job_name: auth-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['microservice-auth:8081']

      - job_name: products-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['microservice-products:8082']

      - job_name: reclamation-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['microservice-reclamation:8084']

      - job_name: forum-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['microservice-forum:8087']

      - job_name: commande-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['microservice-commande:8086']

      - job_name: eureka
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['eureka:8761']

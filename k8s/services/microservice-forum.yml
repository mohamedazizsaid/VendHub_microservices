apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-forum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microservice-forum
  template:
    metadata:
      labels:
        app: microservice-forum
    spec:
      containers:
        - name: microservice-forum
          image: mohamedazizsaid/microservice_forum:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/microserviceForum?createDatabaseIfNotExist=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka:8761/eureka
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
          ports:
            - containerPort: 8087
---
apiVersion: v1
kind: Service
metadata:
  name: microservice-forum
spec:
  selector:
    app: microservice-forum
  ports:
    - port: 8087
      targetPort: 8087

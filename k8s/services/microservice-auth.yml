apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microservice-auth
  template:
    metadata:
      labels:
        app: microservice-auth
    spec:
      containers:
        - name: microservice-auth
          image: mohamedazizsaid/microservice_authentification:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/microserviceUser?createDatabaseIfNotExist=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka:8761/eureka
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: KEYCLOAK_AUTH_SERVER_URL
              value: http://keycloak:8080
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: microservice-auth
spec:
  selector:
    app: microservice-auth
  ports:
    - port: 8081
      targetPort: 8081

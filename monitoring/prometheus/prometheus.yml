global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8085"]

  - job_name: eureka
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka:8761"]

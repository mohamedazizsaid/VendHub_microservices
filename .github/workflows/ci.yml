name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  java-build:
    name: Java Services Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka
          - gateway
          - microservice_authentification
          - microservice_products
          - microservice_Commande
          - microservice_forum
          - microservice_reclamation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn -B -DskipTests clean verify

      - name: SonarQube Analysis ${{ matrix.service }}
        # Le if a été supprimé car secrets n'est pas disponible ici
        working-directory: ${{ matrix.service }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          # On vérifie si le token existe avant d'exécuter SonarQube
          if [ -n "$SONAR_TOKEN" ]; then
            mvn -B sonar:sonar \
              -Dsonar.projectKey=${{ matrix.service }} \
              -Dsonar.projectName=${{ matrix.service }} \
              -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
              -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
              -Dsonar.organization=VendHub_microservices\

              -DskipTests
          else
            echo "SONAR_TOKEN non configuré, analyse SonarQube ignorée"
          fi

  node-build:
    name: Node Services Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - microservice_events
          - E-Commerce Platform Template
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Build ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: npm run build
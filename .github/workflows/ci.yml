name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  java-build:
    name: Java Services Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka
          - gateway
          - microservice_authentification
          - microservice_products
          - microservice_Commande
          - microservice_forum
          - microservice_reclamation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn -B clean verify

  node-build:
    name: Node Services Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - microservice_events
          - E-Commerce Platform Template
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Build ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: npm run build

  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [java-build, node-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: sqa_f4d2b993f9cf7ea79443e64f9aa512a6141fd59d
          SONAR_HOST_URL: localhost://9000
